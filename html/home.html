<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>D Tootales - Home</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <!-- Your Custom CSS (relative path from 'html' folder to 'styles' folder) -->
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <!-- If your logo is in 'assets' folder, do: "../assets/logo.png" -->
        <img src="../assets/logo.png" alt="D Tootales" class="d-inline-block align-text-top">
        D Tootales
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" 
              aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Stories</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Audiobooks</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Store</a></li>
        </ul>
        <!-- Dark Mode Toggle -->
        <div class="toggle-switch ms-3">
          <input type="checkbox" id="darkModeToggle">
          <label for="darkModeToggle" class="toggle-label">
            <span class="toggle-sun">☀️</span>
            <span class="toggle-moon">🌙</span>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- Banner -->
  <div class="banner">
    <div class="banner-text animate__animated animate__fadeInDown">
      <h2>Where Stories Come to Life</h2>
    </div>
  </div>

  <!-- Featured Stories Section (Horizontal Scrolling) -->
  <section class="story-section">
    <h3>Featured Stories</h3>
    <div class="story-cards">
      <!-- Sample Book Card 1 -->
      <div class="story-card animate__animated animate__fadeIn">
        <img src="../assets/image.png" alt="Book 1">
        <h5>The Miraculous Secret</h5>
        <p>When Pedro's friend find a bag of gold...</p>
      </div>
      <!-- More Cards as needed... -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2025 D Tootales. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Your Custom JS (relative path from 'html' folder to 'scripts' folder) -->
  <script src="../scripts/script.js"></script>
</body>
</html>
