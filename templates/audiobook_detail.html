<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ book.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Nav Bar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Tootales" class="logo">
        Tootales
      </a>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>{{ book.title }}</h2>
    <p><strong>Author:</strong> {% for author in book.authors %}{{ author.first_name }} {{ author.last_name }}{% if not loop.last %}, {% endif %}{% endfor %}</p>

    <div class="embed-responsive">
      <iframe src="{{ book.url_librivox }}" width="100%" height="400px" frameborder="0"></iframe>
    </div>

    <a href="{{ url_for('audiobooks') }}" class="btn btn-secondary mt-3">Back to Audiobooks</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
