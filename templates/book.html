<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tootales - Book Detail</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Nav Bar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Tootales" class="d-inline-block align-text-top">
        Tootales
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" 
              aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
        </ul>
        <div class="toggle-switch ms-3">
          <input type="checkbox" id="darkModeToggle">
          <label for="darkModeToggle" class="toggle-label">
            <div class="toggle-icons">
              <span class="toggle-sun">☀️</span>
              <span class="toggle-moon">🌙</span>
            </div>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- Book Detail Content -->
  <div class="container mt-5">
    {% if book %}
      <h2 class="mb-4">Reading: {{ book.title }}</h2>
      {% if text_url %}
        <div class="embed-responsive" style="height: 800px;">
          <iframe src="{{ text_url }}" width="100%" height="100%" frameborder="0"></iframe>
        </div>
      {% else %}
        <p>Sorry, the full text is not available for this book.</p>
      {% endif %}
    {% else %}
      <p>Book not found.</p>
    {% endif %}
    <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to Home</a>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
