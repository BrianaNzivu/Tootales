<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tootales - Book Detail</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Navbar (reuse the same as home) -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Tootales" class="d-inline-block align-text-top">
        Tootales
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" 
              aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <!-- Additional navbar items can be added here -->
        </ul>
        <div class="toggle-switch ms-3">
          <input type="checkbox" id="darkModeToggle">
          <label for="darkModeToggle" class="toggle-label">
            <div class="toggle-icons">
              <span class="toggle-sun">☀️</span>
              <span class="toggle-moon">🌙</span>
            </div>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- Book Detail Content with Tabs -->
  <div class="container mt-5">
    <h2 class="mb-4">Reading: {{ identifier }}</h2>
    <!-- Bootstrap Tabs for Read, Listen, and Watch -->
    <ul class="nav nav-tabs" id="mediaTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="read-tab" data-bs-toggle="tab" data-bs-target="#read" type="button" role="tab" aria-controls="read" aria-selected="true">Read</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="listen-tab" data-bs-toggle="tab" data-bs-target="#listen" type="button" role="tab" aria-controls="listen" aria-selected="false">Listen</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="watch-tab" data-bs-toggle="tab" data-bs-target="#watch" type="button" role="tab" aria-controls="watch" aria-selected="false">Watch</button>
      </li>
    </ul>
    <div class="tab-content" id="mediaTabsContent">
      <!-- Read Tab -->
      <div class="tab-pane fade show active" id="read" role="tabpanel" aria-labelledby="read-tab">
        <div class="embed-responsive" style="height: 800px;">
          <iframe src="https://archive.org/details/{{ identifier }}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
      <!-- Listen Tab -->
      <div class="tab-pane fade" id="listen" role="tabpanel" aria-labelledby="listen-tab">
        <button id="playAudio" class="btn btn-primary mt-3">Play Audio</button>
        <div class="embed-responsive" style="height: 800px; margin-top:20px;">
          <iframe src="https://archive.org/embed/{{ identifier }}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
      <!-- Watch Tab -->
      <div class="tab-pane fade" id="watch" role="tabpanel" aria-labelledby="watch-tab">
        <div class="embed-responsive" style="height: 800px;">
          <iframe src="https://archive.org/embed/{{ identifier }}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
    </div>
    <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Back to Home</a>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
